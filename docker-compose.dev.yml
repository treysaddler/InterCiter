# InterCiter — self-contained development stack for local testing.
#
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml exec backend interciter seed
#   docker compose -f docker-compose.dev.yml exec backend interciter useradd me --role admin
#
# Unlike docker-compose.yml (the shinyserver home-network deployment), this file
# has no external dependencies: no Traefik / shinyserver_default network and no
# /truestorage NAS bind mount. Everything runs on the default compose network and
# stores data in named volumes, so `docker compose -f docker-compose.dev.yml up`
# works on any machine with Docker.
#
# The web UI is served at http://localhost:${WEB_PORT:-8080}. nginx reverse-proxies
# /v1 and /health to the API, so the browser sees one origin.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interciter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interciter}
      POSTGRES_DB: ${POSTGRES_DB:-interciter}
    ports:
      # Exposed for local inspection with psql/GUI clients during development.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interciter} -d ${POSTGRES_DB:-interciter}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      INTERCITER_DATABASE_URL: >-
        postgresql+psycopg://${POSTGRES_USER:-interciter}:${POSTGRES_PASSWORD:-interciter}@db:5432/${POSTGRES_DB:-interciter}
      # http-only dev: cookies can't be Secure or the browser drops the session.
      INTERCITER_SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # Optional: raises Semantic Scholar rate limits and unlocks the Datasets API.
      INTERCITER_S2_API_KEY: ${S2_API_KEY:-}
      # Bulk shards land in a named volume rather than a NAS mount for dev.
      INTERCITER_S2_DATASETS_DIR: /data/s2-datasets
    volumes:
      - s2-datasets-dev:/data/s2-datasets
    command:
      - uvicorn
      - interciter.api.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "${UVICORN_WORKERS:-2}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      API_UPSTREAM: http://backend:8000
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      - backend

volumes:
  db-data-dev:
  s2-datasets-dev:
