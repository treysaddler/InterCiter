# InterCiter SPA + API reverse proxy.
#
# ${API_UPSTREAM} is substituted at container start (envsubst via the nginx
# image entrypoint). Everything under /v1 and /health is proxied to the backend;
# all other paths fall back to index.html for client-side routing.

server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Don't leak the nginx version.
    server_tokens off;

    # Static assets with hashed filenames can be cached aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API + health: same-origin reverse proxy to the FastAPI service.
    location /v1/ {
        proxy_pass         ${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass         ${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA client-side routing: unknown paths return the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
