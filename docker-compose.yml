# InterCiter — full stack for local deployment and scaling.
#
#   docker compose up --build          # build + start db, api, web
#   docker compose exec backend interciter seed        # load the sample corpus
#   docker compose exec backend interciter useradd me --role admin   # bootstrap
#
# The web UI is served at http://localhost:${WEB_PORT:-8080}. nginx reverse-proxies
# /v1 and /health to the API, so the browser sees one origin and the BFF session
# cookie works without CORS. PostgreSQL is the system of record.
#
# Copy .env.example to .env and set POSTGRES_PASSWORD before exposing this anywhere.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interciter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interciter}
      POSTGRES_DB: ${POSTGRES_DB:-interciter}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interciter} -d ${POSTGRES_DB:-interciter}"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      # No HTTP endpoint of its own — don't let exposedByDefault guess a router.
      - "traefik.enable=false"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      INTERCITER_DATABASE_URL: >-
        postgresql+psycopg://${POSTGRES_USER:-interciter}:${POSTGRES_PASSWORD:-interciter}@db:5432/${POSTGRES_DB:-interciter}
      # Defaults to false for a bare local `docker compose up` (http-only,
      # cookies can't be Secure). This deployment sets it true in .env since
      # Traefik terminates real TLS in front.
      INTERCITER_SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # Required for the Datasets API (bulk S2 snapshots); the Graph API works
      # unauthenticated too but at a much lower rate limit without this.
      INTERCITER_S2_API_KEY: ${S2_API_KEY:-}
      # Bulk shards land here, bind-mounted onto the /truestorage NAS (40TB free)
      # rather than the container/root filesystem (49GB free on this host).
      INTERCITER_S2_DATASETS_DIR: /data/s2-datasets
    volumes:
      - /truestorage/interciter-data/s2-datasets:/data/s2-datasets
    # Scale request throughput with more uvicorn workers (or `docker compose up
    # --scale backend=N` behind a load balancer).
    command:
      - uvicorn
      - interciter.api.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "${UVICORN_WORKERS:-2}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      # Reached only via nginx inside the frontend container — don't let
      # exposedByDefault guess a router for it too.
      - "traefik.enable=false"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      API_UPSTREAM: http://backend:8000
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      - backend
    # Also join the shinyserver stack's network so its Traefik can reach this
    # container directly; `default` is kept so frontend can still reach backend.
    networks:
      - default
      - shinyserver
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shinyserver_default"
      - "traefik.http.routers.interciter.rule=Host(`interciter.com`)"
      - "traefik.http.routers.interciter.entrypoints=websecure"
      - "traefik.http.routers.interciter.tls.certresolver=cloudflare"
      - "traefik.http.services.interciter.loadbalancer.server.port=8080"
      - "traefik.http.routers.interciter-local.rule=Host(`interciter.home.arpa`)"
      - "traefik.http.routers.interciter-local.entrypoints=websecure"
      - "traefik.http.routers.interciter-local.tls=true"

networks:
  shinyserver:
    external: true
    name: shinyserver_default

volumes:
  db-data:
